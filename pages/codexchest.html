<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Chests | Codex of Destiny</title>
  
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/animations.css">
</head>
<body class="page-transition-enter" data-protected="true">

  <div id="navbar-container"></div>

  <main class="container" style="padding-top: 120px; padding-bottom: 100px; min-height: 100vh; text-align: center;">
    <h1 style="font-size: 3rem; margin-bottom: var(--spacing-2); text-shadow: var(--shadow-glow);">Daily Void Chest</h1>
    <p style="color: var(--color-muted); margin-bottom: var(--spacing-12);">Unlock the chest to reveal your destiny. What lies inside?</p>

    <div style="display: flex; flex-direction: column; align-items: center; gap: var(--spacing-8);">
      <div id="chest-wrapper" class="chest-wrapper">
        <!-- SVG Chest (Base and Lid) -->
        <svg viewBox="0 0 100 100" width="200" height="200" style="overflow: visible;">
          <!-- Base -->
          <path d="M 10,60 L 90,60 L 85,95 L 15,95 Z" fill="#4b5563" stroke="#9ca3af" stroke-width="2"/>
          <rect x="45" y="60" width="10" height="15" fill="#f59e0b"/>
          <!-- Lid -->
          <g class="chest-lid">
            <path d="M 10,60 Q 50,30 90,60 Z" fill="#6b7280" stroke="#9ca3af" stroke-width="2"/>
            <rect x="45" y="55" width="10" height="10" fill="#d97706"/>
          </g>
        </svg>
        <div class="particles" style="background: radial-gradient(circle, #f59e0b 0%, transparent 70%);"></div>
      </div>
      
      <button id="btn-open-chest" class="btn btn-primary" style="font-size: 1.2rem; padding: 16px 32px;">Open Void Chest</button>

      <div id="loot-container" style="width: 100%; max-width: 400px; min-height: 200px;">
        <!-- Loot card renders here -->
      </div>
    </div>
  </main>

  <div id="spotify-widget"></div>
  <div id="footer-container"></div>
  <script type="module" src="../scripts/utils.js"></script>
  <script type="module" src="../scripts/auth.js"></script>
  <script type="module" src="../scripts/chest.js"></script>
  <script type="module" src="../scripts/spotify.js"></script>
</body>
</html>
