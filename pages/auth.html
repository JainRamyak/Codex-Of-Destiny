<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth | Codex of Destiny</title>
  
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg) url('https://www.transparenttextures.com/patterns/stardust.png') repeat top center;
      padding: var(--spacing-4);
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(124, 58, 237, 0.3);
      padding: var(--spacing-8);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-glow);
    }
    .auth-tabs {
      display: flex;
      gap: var(--spacing-4);
      margin-bottom: var(--spacing-8);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: var(--spacing-2);
    }
    .auth-tab {
      color: var(--color-muted);
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
    }
    .auth-tab.active {
      color: var(--color-primary);
      text-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
    }
    .auth-tab:hover {
      color: var(--color-text);
    }
  </style>
</head>
<body class="page-transition-enter">

  <div id="navbar-container"></div>

  <div class="auth-container">
    <div class="auth-card animate-float">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Login</div>
        <div class="auth-tab" id="tab-signup">Sign Up</div>
      </div>

      <form id="login-form">
        <div class="form-group">
          <input type="email" name="email" class="form-control" placeholder=" " required>
          <label class="floating-label">Email Address</label>
        </div>
        <div class="form-group">
          <input type="password" name="password" id="login-password" class="form-control" placeholder=" " required minlength="8">
          <label class="floating-label">Password</label>
          <span class="password-toggle" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--color-muted);">👁️</span>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-4);">Enter the Void</button>
        <p id="forgot-password-btn" style="text-align: center; margin-top: var(--spacing-4); font-size: 0.85rem; color: var(--color-muted); cursor: pointer;">Forgot Password?</p>
      </form>

      <form id="signup-form" style="display: none;">
        <div class="form-group">
          <input type="email" name="email" class="form-control" placeholder=" " required>
          <label class="floating-label">Email Address</label>
        </div>
        <div class="form-group">
          <input type="password" name="password" id="signup-password" class="form-control" placeholder=" " required minlength="8">
          <label class="floating-label">Password (Min 8 chars)</label>
          <span class="password-toggle" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--color-muted);">👁️</span>
        </div>
        <div class="form-group">
          <input type="password" name="confirmPassword" id="signup-confirm-password" class="form-control" placeholder=" " required minlength="8">
          <label class="floating-label">Confirm Password</label>
          <span class="password-toggle" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--color-muted);">👁️</span>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-4);">Create Account</button>
      </form>
    </div>
  </div>

  <div id="footer-container"></div>
  <script type="module" src="../scripts/utils.js"></script>
  <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
