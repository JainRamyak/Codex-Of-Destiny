<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Save Point Inn | Codex of Destiny</title>
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--pixel-surface);
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
    }
    .tabs {
      display: flex;
      margin-bottom: 1rem;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: var(--pixel-black);
      color: var(--pixel-gold);
      border: var(--border-pixel);
      cursor: pointer;
      font-size: 10px;
    }
    .tab.active {
      background: var(--pixel-gold);
      color: var(--pixel-black);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h1 class="text-gold" style="text-align: center; font-size: 1.5rem; text-shadow: var(--shadow-pixel);">THE SAVE POINT INN</h1>
    <p style="text-align: center; margin-bottom: 2rem; font-size: 10px;">Rest here, weary traveler.</p>
    
    <div class="tabs">
      <div class="tab active" id="tab-login">RETURNING HERO</div>
      <div class="tab" id="tab-register">NEW HERO</div>
    </div>

    <div class="panel" id="auth-panel">
      <div id="error-msg" class="error-msg" style="display: none;"></div>
      <form id="auth-form">
        <div id="register-fields" style="display: none;">
          <label class="text-green" style="font-size:10px;">USERNAME</label>
          <input type="text" id="username" placeholder="Enter username">
        </div>
        
        <label class="text-green" style="font-size:10px;">EMAIL</label>
        <input type="email" id="email" placeholder="Enter email" required>
        
        <label class="text-green" style="font-size:10px;">PASSWORD</label>
        <input type="password" id="password" placeholder="Enter password" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;" id="submit-btn">ENTER REALM</button>
      </form>
    </div>
    
    <div style="text-align:center; margin-top: 1rem;">
      <a href="../index.html" style="font-size: 10px;">FLEE TO MENU</a>
    </div>
  </div>

  <script src="../scripts/utils.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
