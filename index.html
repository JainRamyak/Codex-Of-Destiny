<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex of Destiny | Press Start</title>
  <link rel="stylesheet" href="styles/globals.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/animations.css">
  <style>
    body {
      overflow: hidden; /* Hide scrollbars for title screen */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--pixel-black);
    }
    
    .title-glow {
      color: var(--pixel-gold);
      font-size: clamp(2rem, 5vw, 4rem);
      text-shadow: 0 0 10px var(--pixel-gold), 0 0 20px #ff8c00;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.2;
    }

    .tagline {
      font-size: 14px;
      color: var(--pixel-white);
      margin-bottom: 3rem;
      min-height: 20px;
    }

    .button-container {
      display: flex;
      gap: 20px;
      margin-bottom: 2rem;
    }

    .sprites-container {
      position: absolute;
      bottom: 20px;
      width: 100%;
      height: 64px;
      display: flex;
      justify-content: space-around;
    }

    .sprite {
      width: 32px;
      height: 32px;
      background: var(--pixel-green);
      /* Placeholder for a walking character sprite */
      border-radius: 4px;
    }

  </style>
</head>
<body>

  <!-- Starfield container injected via JS -->
  <div id="starfield"></div>

  <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center;">
    <h1 class="title-glow">CODEX OF<br>DESTINY</h1>
    
    <div class="tagline" id="tagline-text"></div>

    <div class="blink" style="color: var(--pixel-white); margin-bottom: 2rem; font-size: 14px;">
      ▶ PRESS START
    </div>

    <div class="button-container">
      <a href="pages/character-create.html" class="btn">NEW GAME</a>
      <a href="pages/auth.html" class="btn">CONTINUE</a>
    </div>
  </div>

  <div class="sprites-container">
    <div class="sprite sprite-walk" style="background: var(--pixel-blue);"></div>
    <div class="sprite sprite-walk" style="background: var(--pixel-red);"></div>
    <div class="sprite sprite-walk" style="background: var(--pixel-purple);"></div>
  </div>

  <script src="scripts/utils.js"></script>
  <script>
    // Generate Starfield
    const starfield = document.getElementById('starfield');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}vw`;
      star.style.top = `${Math.random() * 100}vh`;
      star.style.animationDelay = `${Math.random() * 2}s`;
      star.style.animationDuration = `${Math.random() * 2 + 1}s`;
      starfield.appendChild(star);
    }

    // Typewriter effect for tagline
    document.addEventListener("DOMContentLoaded", () => {
      const utils = new GameUtils();
      utils.typeWriter("Write Code. Cast Spells. Save the Realm.", 'tagline-text', 100);
      
      // Add sound to buttons
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', () => {
          utils.playSound('click');
        });
      });
    });
  </script>
</body>
</html>
